<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">
  <defs>
    <!-- Gradientes dourados -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="30%" stop-color="#FFB800"/>
      <stop offset="70%" stop-color="#E5A400"/>
      <stop offset="100%" stop-color="#C8930A"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8930A"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFB800"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="30%" stop-color="#C0C0C0"/>
      <stop offset="70%" stop-color="#999"/>
      <stop offset="100%" stop-color="#777"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="tireGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="40%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0d0d0"/>
      <stop offset="50%" stop-color="#888"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>
    <!-- Filtro de sombra -->
    <filter id="shadow1">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ================================================
       EMBLEMA EXTERIOR (Oval shield dourado)
  ================================================ -->
  <!-- Anel externo dourado -->
  <ellipse cx="300" cy="320" rx="270" ry="290" fill="none" stroke="url(#gold)" stroke-width="8"/>
  <ellipse cx="300" cy="320" rx="262" ry="282" fill="none" stroke="url(#goldDark)" stroke-width="3"/>
  
  <!-- Fundo escuro interior -->
  <ellipse cx="300" cy="320" rx="255" ry="275" fill="url(#bgGrad)"/>
  
  <!-- Anel interno dourado fino -->
  <ellipse cx="300" cy="320" rx="245" ry="265" fill="none" stroke="url(#goldDark)" stroke-width="1.5" opacity="0.5"/>

  <!-- ================================================
       PNEU CENTRAL (topo)
  ================================================ -->
  <g transform="translate(300, 195)" filter="url(#shadow1)">
    <!-- Pneu exterior -->
    <circle cx="0" cy="0" r="95" fill="url(#tireGrad)" stroke="#2a2a2a" stroke-width="3"/>
    <!-- Sulcos do pneu (banda de rodagem) -->
    <circle cx="0" cy="0" r="92" fill="none" stroke="#2f2f2f" stroke-width="2"/>
    <circle cx="0" cy="0" r="85" fill="none" stroke="#333" stroke-width="1.5"/>
    <!-- Padrão de sulcos -->
    <g stroke="#2d2d2d" stroke-width="4" stroke-linecap="round" opacity="0.8">
      <line x1="-65" y1="-65" x2="-80" y2="-50" />
      <line x1="-40" y1="-78" x2="-50" y2="-60" />
      <line x1="-10" y1="-85" x2="-14" y2="-68" />
      <line x1="20" y1="-85" x2="18" y2="-68" />
      <line x1="50" y1="-78" x2="55" y2="-60" />
      <line x1="72" y1="-58" x2="82" y2="-44" />
      <line x1="85" y1="-30" x2="70" y2="-26" />
      <line x1="88" y1="5" x2="72" y2="3" />
      <line x1="82" y1="40" x2="68" y2="35" />
      <line x1="65" y1="65" x2="55" y2="52" />
      <line x1="38" y1="82" x2="34" y2="65" />
      <line x1="5" y1="88" x2="4" y2="70" />
      <line x1="-30" y1="85" x2="-26" y2="68" />
      <line x1="-60" y1="70" x2="-52" y2="56" />
      <line x1="-80" y1="42" x2="-66" y2="36" />
      <line x1="-90" y1="8" x2="-74" y2="6" />
      <line x1="-86" y1="-25" x2="-70" y2="-22" />
    </g>
    <!-- Roda / aro -->
    <circle cx="0" cy="0" r="52" fill="url(#rimGrad)" stroke="#999" stroke-width="2"/>
    <circle cx="0" cy="0" r="48" fill="#444" stroke="#666" stroke-width="1.5"/>
    <!-- Furos da roda -->
    <circle cx="0" cy="-30" r="8" fill="#222" stroke="#555" stroke-width="1"/>
    <circle cx="26" cy="-15" r="8" fill="#222" stroke="#555" stroke-width="1"/>
    <circle cx="26" cy="15" r="8" fill="#222" stroke="#555" stroke-width="1"/>
    <circle cx="0" cy="30" r="8" fill="#222" stroke="#555" stroke-width="1"/>
    <circle cx="-26" cy="15" r="8" fill="#222" stroke="#555" stroke-width="1"/>
    <circle cx="-26" cy="-15" r="8" fill="#222" stroke="#555" stroke-width="1"/>
    <!-- Centro do cubo -->
    <circle cx="0" cy="0" r="14" fill="#333" stroke="#555" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="6" fill="#555"/>
  </g>

  <!-- ================================================
       BADGE 24H (canto superior esquerdo)
  ================================================ -->
  <g transform="translate(110, 180)" filter="url(#shadow2)">
    <circle cx="0" cy="0" r="38" fill="#111" stroke="url(#gold)" stroke-width="3"/>
    <circle cx="0" cy="0" r="33" fill="none" stroke="#333" stroke-width="1"/>
    <!-- Relógio -->
    <circle cx="0" cy="-8" r="14" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <line x1="0" y1="-8" x2="0" y2="-17" stroke="url(#gold)" stroke-width="2"/>
    <line x1="0" y1="-8" x2="6" y2="-6" stroke="url(#gold)" stroke-width="1.5"/>
    <circle cx="0" cy="-8" r="2" fill="url(#gold)"/>
    <text x="0" y="20" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="16" fill="url(#goldLight)">24H</text>
  </g>

  <!-- ================================================
       BANNER CENTRAL (shield / faixa)
  ================================================ -->
  <!-- Faixa banner dourada - formato shield -->
  <g filter="url(#shadow1)">
    <path d="M 60,350 L 80,320 L 520,320 L 540,350 L 520,380 L 80,380 Z" fill="url(#gold)" stroke="url(#goldDark)" stroke-width="2"/>
    <path d="M 68,348 L 86,322 L 514,322 L 532,348 L 514,374 L 86,374 Z" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
  </g>
  
  <!-- Texto BORRACHARIA -->
  <text x="300" y="332" text-anchor="middle" font-family="Arial Black, Impact, Arial, sans-serif" font-weight="900" font-size="28" fill="#111" letter-spacing="4" filter="url(#shadow2)">BORRACHARIA</text>

  <!-- ================================================
       TEXTO CHIMARRÃO (grande, dourado, impactante)
  ================================================ -->
  <text x="300" y="430" text-anchor="middle" font-family="Arial Black, Impact, Arial, sans-serif" font-weight="900" font-size="72" fill="url(#goldLight)" stroke="url(#goldDark)" stroke-width="1.5" letter-spacing="2" filter="url(#shadow1)">CHIMARRÃO</text>

  <!-- Reflexo no texto -->
  <text x="300" y="430" text-anchor="middle" font-family="Arial Black, Impact, Arial, sans-serif" font-weight="900" font-size="72" fill="url(#goldLight)" letter-spacing="2" opacity="0.15" transform="translate(0,1)">CHIMARRÃO</text>

  <!-- ================================================
       SUBTEXTO - Tipos de veículo
  ================================================ -->
  <g>
    <text x="300" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#ccc" letter-spacing="3">
      CAMINHÃO  •  CARRO  •  MOTO  •  TRATOR
    </text>
  </g>

  <!-- ================================================
       FERRAMENTAS CRUZADAS
  ================================================ -->
  <g transform="translate(300, 500)" filter="url(#shadow2)">
    <!-- Círculo de fundo -->
    <circle cx="0" cy="0" r="30" fill="#111" stroke="url(#gold)" stroke-width="2.5"/>
    <!-- Chave inglesa esquerda -->
    <g transform="rotate(-45)">
      <rect x="-4" y="-24" width="8" height="30" rx="2" fill="url(#chrome)"/>
      <path d="M -8,-24 L -4,-28 L 4,-28 L 8,-24 L 8,-18 L -8,-18 Z" fill="url(#chrome)"/>
      <rect x="-2" y="6" width="4" height="10" rx="1" fill="#999"/>
    </g>
    <!-- Chave inglesa direita -->
    <g transform="rotate(45)">
      <rect x="-4" y="-24" width="8" height="30" rx="2" fill="url(#chrome)"/>
      <path d="M -8,-24 L -4,-28 L 4,-28 L 8,-24 L 8,-18 L -8,-18 Z" fill="url(#chrome)"/>
      <rect x="-2" y="6" width="4" height="10" rx="1" fill="#999"/>
    </g>
    <!-- Centro -->
    <circle cx="0" cy="0" r="5" fill="url(#gold)"/>
  </g>

  <!-- ================================================
       ESTRELAS
  ================================================ -->
  <g fill="url(#gold)">
    <text x="210" y="548" text-anchor="middle" font-size="18">★</text>
    <text x="240" y="548" text-anchor="middle" font-size="18">★</text>
    <text x="270" y="548" text-anchor="middle" font-size="18">★</text>
    <text x="300" y="548" text-anchor="middle" font-size="18">★</text>
    <text x="330" y="548" text-anchor="middle" font-size="18">★</text>
    <text x="360" y="548" text-anchor="middle" font-size="18">★</text>
    <text x="390" y="548" text-anchor="middle" font-size="18">★</text>
  </g>

  <!-- ================================================
       LOCALIZAÇÃO: BR-376 e KM 640
  ================================================ -->
  <text x="190" y="575" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="url(#goldLight)" letter-spacing="1">BR-376</text>
  <text x="410" y="575" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="url(#goldLight)" letter-spacing="1">KM 640</text>

  <!-- ================================================
       CIDADE
  ================================================ -->
  <text x="300" y="608" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="18" fill="url(#gold)" letter-spacing="2">SÃO JOSÉ DOS PINHAIS - PR</text>

  <!-- ================================================
       DESDE 1990 (bottom badge)
  ================================================ -->
  <g transform="translate(300, 650)">
    <!-- Banner inferior -->
    <path d="M -80,0 L -70,-14 L 70,-14 L 80,0 L 70,14 L -70,14 Z" fill="url(#gold)" stroke="url(#goldDark)" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="14" fill="#111" letter-spacing="3">DESDE 1990</text>
  </g>

  <!-- ================================================
       ASAS / WINGS estilizadas (ao lado do banner)
  ================================================ -->
  <!-- Asa esquerda -->
  <g opacity="0.7">
    <path d="M 100,358 L 60,345 L 40,340 L 25,338 Q 15,337 25,345 L 45,355 L 65,362 Z" fill="url(#chrome)" opacity="0.6"/>
    <path d="M 100,362 L 60,355 L 40,352 L 30,351 Q 22,350 30,356 L 50,363 L 70,368 Z" fill="url(#chrome)" opacity="0.4"/>
  </g>
  <!-- Asa direita -->
  <g opacity="0.7">
    <path d="M 500,358 L 540,345 L 560,340 L 575,338 Q 585,337 575,345 L 555,355 L 535,362 Z" fill="url(#chrome)" opacity="0.6"/>
    <path d="M 500,362 L 540,355 L 560,352 L 570,351 Q 578,350 570,356 L 550,363 L 530,368 Z" fill="url(#chrome)" opacity="0.4"/>
  </g>
</svg>
