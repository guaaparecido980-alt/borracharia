<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="fGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#C8930A"/>
    </linearGradient>
    <linearGradient id="fTire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="50%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="fRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0d0d0"/>
      <stop offset="50%" stop-color="#888"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>
    <filter id="fSh">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Fundo preto arredondado -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0a0a0a"/>
  
  <!-- Anel dourado exterior -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#fGold)" stroke-width="16"/>
  <circle cx="256" cy="256" r="218" fill="none" stroke="#C8930A" stroke-width="3" opacity="0.4"/>
  
  <!-- Pneu -->
  <circle cx="256" cy="256" r="190" fill="url(#fTire)" stroke="#2a2a2a" stroke-width="4" filter="url(#fSh)"/>
  
  <!-- Sulcos do pneu - padrão direcional -->
  <g stroke="#2d2d2d" stroke-width="8" stroke-linecap="round" opacity="0.7">
    <!-- Top -->
    <line x1="200" y1="80" x2="215" y2="110"/>
    <line x1="256" y1="68" x2="256" y2="100"/>
    <line x1="312" y1="80" x2="297" y2="110"/>
    <!-- Right -->
    <line x1="430" y1="200" x2="400" y2="215"/>
    <line x1="444" y1="256" x2="412" y2="256"/>
    <line x1="430" y1="312" x2="400" y2="297"/>
    <!-- Bottom -->
    <line x1="312" y1="432" x2="297" y2="402"/>
    <line x1="256" y1="444" x2="256" y2="412"/>
    <line x1="200" y1="432" x2="215" y2="402"/>
    <!-- Left -->
    <line x1="82" y1="312" x2="112" y2="297"/>
    <line x1="68" y1="256" x2="100" y2="256"/>
    <line x1="82" y1="200" x2="112" y2="215"/>
    <!-- Diagonais -->
    <line x1="130" y1="130" x2="155" y2="155"/>
    <line x1="382" y1="130" x2="357" y2="155"/>
    <line x1="382" y1="382" x2="357" y2="357"/>
    <line x1="130" y1="382" x2="155" y2="357"/>
  </g>
  
  <!-- Roda/aro -->
  <circle cx="256" cy="256" r="110" fill="url(#fRim)" stroke="#999" stroke-width="4"/>
  <circle cx="256" cy="256" r="100" fill="#444" stroke="#666" stroke-width="3"/>
  
  <!-- Furos da roda -->
  <circle cx="256" cy="196" r="16" fill="#222" stroke="#555" stroke-width="2"/>
  <circle cx="308" cy="226" r="16" fill="#222" stroke="#555" stroke-width="2"/>
  <circle cx="308" cy="286" r="16" fill="#222" stroke="#555" stroke-width="2"/>
  <circle cx="256" cy="316" r="16" fill="#222" stroke="#555" stroke-width="2"/>
  <circle cx="204" cy="286" r="16" fill="#222" stroke="#555" stroke-width="2"/>
  <circle cx="204" cy="226" r="16" fill="#222" stroke="#555" stroke-width="2"/>
  
  <!-- Centro do cubo -->
  <circle cx="256" cy="256" r="32" fill="#333" stroke="#555" stroke-width="3"/>
  <circle cx="256" cy="256" r="14" fill="url(#fGold)"/>
  
  <!-- Marca "C" no centro -->
  <text x="256" y="264" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="20" fill="#0a0a0a">C</text>
</svg>
